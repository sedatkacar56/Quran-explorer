async function loadQuran(){

let ar=await fetch("https://api.alquran.cloud/v1/quran/quran-uthmani")
let en=await fetch("https://api.alquran.cloud/v1/quran/en.sahih")

let arData=await ar.json()
let enData=await en.json()

arData.data.surahs.forEach((s,i)=>{

s.ayahs.forEach((v,j)=>{

verses.push({
surah:s.number,
ayah:v.numberInSurah,
arabic:v.text,
english:enData.data.surahs[i].ayahs[j].text
})

})

})

randomVerse()

}

async function randomVerse(){

let v=verses[Math.floor(Math.random()*verses.length)]

document.getElementById("surahName").innerText =
SURAH_NAMES[v.surah] || "Surah "+v.surah

document.getElementById("surahRef").innerText =
"Surah "+v.surah+" · Verse "+v.ayah

document.getElementById("surahTheme").innerText =
SURAH_THEMES[v.surah] || ""

document.getElementById("english").innerText =
'"'+v.english+'"'

let key=v.surah+":"+v.ayah

let words=await fetchWords(key)

renderArabic(words)

}

async function fetchWords(key){

if(wordCache[key]) return wordCache[key]

let url=`https://api.qurancdn.com/api/qdc/verses/by_key/${key}?words=true&word_fields=text_uthmani,translation_text,transliteration_text`

let r=await fetch(url)
let data=await r.json()

let words=data.verse.words.filter(w=>w.char_type_name=="word")

wordCache[key]=words
return words

}

function renderArabic(words){

let container=document.getElementById("arabic")
container.innerHTML=""

words.forEach(w=>{

let span=document.createElement("span")
span.className="word"
span.innerText=w.text_uthmani+" "

span.onmouseover=(e)=>showTooltip(e,w)
span.onmouseout=hideTooltip

span.ontouchstart=(e)=>{
  e.preventDefault()
  if(activeSpan===span){
    hideTooltip()
    activeSpan=null
  } else {
    showTooltip(e.touches[0],w)
    activeSpan=span
  }
}


container.appendChild(span)

})

}

function showTooltip(e,w){

let t=document.getElementById("tooltip")

t.innerHTML=
"<b>"+w.text_uthmani+"</b><br>"+
(w.transliteration?.text || "")+"<br>"+
(w.translation?.text || "")

t.style.left=e.pageX+"px"
t.style.top=(e.pageY-40)+"px"
t.style.display="block"

}

function hideTooltip(){
document.getElementById("tooltip").style.display="none"
}

loadQuran()
